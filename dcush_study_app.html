
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { padding: 1.5rem 1rem; max-width: 700px; margin: 0 auto; }
.screen { display: none; }
.screen.active { display: block; }

.hero { text-align: center; padding: 2rem 0 1rem; }
.hero h1 { font-size: 26px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
.hero p { font-size: 15px; color: var(--color-text-secondary); max-width: 420px; margin: 0 auto 2rem; }

.topic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 2rem; }
.topic-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.topic-card:hover { border-color: var(--color-border-primary); background: var(--color-background-secondary); }
.topic-card h3 { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.topic-card p { font-size: 12px; color: var(--color-text-secondary); }
.topic-num { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 6px; }

.mode-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.mode-btn { flex: 1; min-width: 120px; padding: 10px 14px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; color: var(--color-text-primary); display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
.mode-btn:hover { background: var(--color-background-secondary); }
.mode-btn.selected { border: 1.5px solid #185FA5; background: #E6F1FB; color: #0C447C; }
.mode-btn i { font-size: 16px; }

.briefing-box { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
.briefing-box h2 { font-size: 17px; font-weight: 500; margin-bottom: 10px; color: var(--color-text-primary); }
.briefing-box p, .briefing-box li { font-size: 14px; color: var(--color-text-secondary); line-height: 1.7; }
.briefing-box ul { padding-left: 1.2rem; }

.question-area { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
.q-label { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
.q-text { font-size: 16px; font-weight: 500; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 1.25rem; }

.mc-options { display: grid; gap: 8px; }
.mc-opt { padding: 12px 14px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); cursor: pointer; font-size: 14px; color: var(--color-text-primary); transition: all 0.15s; display: flex; gap: 10px; align-items: flex-start; }
.mc-opt:hover { border-color: var(--color-border-primary); }
.mc-opt.selected { border: 1.5px solid #185FA5; background: #E6F1FB; color: #0C447C; }
.mc-opt.correct { border: 1.5px solid #0F6E56; background: #E1F5EE; color: #085041; }
.mc-opt.wrong { border: 1.5px solid #993C1D; background: #FAECE7; color: #4A1B0C; }
.opt-letter { font-weight: 500; min-width: 18px; }

.eq-input { width: 100%; min-height: 120px; padding: 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-primary); resize: vertical; line-height: 1.6; }
.eq-input:focus { outline: none; border-color: #185FA5; box-shadow: 0 0 0 2px rgba(24,95,165,0.12); }

.table-area { overflow-x: auto; margin-bottom: 1rem; }
.study-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.study-table th { background: var(--color-background-secondary); padding: 10px 12px; text-align: left; font-weight: 500; font-size: 12px; color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
.study-table td { padding: 8px 10px; border: 0.5px solid var(--color-border-tertiary); vertical-align: top; }
.study-table textarea { width: 100%; min-height: 60px; border: none; background: transparent; font-size: 13px; font-family: var(--font-sans); color: var(--color-text-primary); resize: vertical; outline: none; }
.study-table textarea:focus { background: var(--color-background-info); }

.btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
.btn { padding: 10px 20px; border-radius: var(--border-radius-md); font-size: 14px; cursor: pointer; transition: all 0.15s; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }
.btn:hover { background: var(--color-background-secondary); }
.btn.primary { background: #185FA5; color: white; border-color: #185FA5; }
.btn.primary:hover { background: #0C447C; }
.btn.ai-btn { background: #3C3489; color: white; border-color: #3C3489; }
.btn.ai-btn:hover { background: #26215C; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.feedback-box { border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; font-size: 14px; line-height: 1.7; }
.feedback-box.loading { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); }
.feedback-box.success { background: #E1F5EE; border: 0.5px solid #5DCAA5; color: #085041; }
.feedback-box.partial { background: #FAEEDA; border: 0.5px solid #EF9F27; color: #412402; }
.feedback-box.error { background: #FAECE7; border: 0.5px solid #F0997B; color: #4A1B0C; }
.feedback-label { font-weight: 500; font-size: 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }

.progress-bar { height: 3px; background: var(--color-background-secondary); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-fill { height: 100%; background: #185FA5; border-radius: 2px; transition: width 0.3s; }

.score-screen { text-align: center; padding: 2rem 0; }
.score-big { font-size: 48px; font-weight: 500; color: var(--color-text-primary); margin: 1rem 0 0.5rem; }
.score-sub { font-size: 15px; color: var(--color-text-secondary); margin-bottom: 2rem; }
.score-detail { text-align: left; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }

.nav-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; }
.nav-back { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 14px; display: flex; align-items: center; gap: 4px; padding: 4px 0; }
.nav-back:hover { color: var(--color-text-primary); }
.nav-title { font-size: 13px; color: var(--color-text-secondary); }

.typing { display: inline-flex; gap: 3px; align-items: center; }
.typing span { width: 5px; height: 5px; background: var(--color-text-tertiary); border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
</style>

      { q: "Which 1896 Supreme Court case did Brown v. Board of Education overturn?", opts: ["Marbury v. Madison","McCulloch v. Maryland","Plessy v. Ferguson","Korematsu v. United States"], ans: 2 },
      { q: "Who argued the Brown v. Board case before the Supreme Court on behalf of the NAACP?", opts: ["Martin Luther King Jr.","Thurgood Marshall","W.E.B. Du Bois","John Lewis"], ans: 1 },
      { q: "What did the Brown decision declare about 'separate but equal' schools?", opts: ["They were acceptable if truly equal in resources","They were unconstitutional — separate is inherently unequal","They were only unconstitutional in the South","They violated the 13th Amendment"], ans: 1 },

      { q: "During WWII, federal power expanded most dramatically through:", opts: ["New social welfare programs","Total war mobilization and control of industries","Civil rights legislation","Educational funding increases"], ans: 1 },

let currentTopic = null;
let currentMode = null;
let currentQ = 0;
let answers = [];
let scores = [];
let tableData = {};

function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home').classList.add('active');
}

function buildTopicGrid() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = '';
  TOPICS.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.innerHTML = `<div class="topic-num">${t.section}</div><h3>${t.title}</h3><p style="font-size:11px;color:var(--color-text-tertiary)">MC · Essay${t.table ? ' · Table' : ''}</p>`;
    card.onclick = () => openTopic(i);
    grid.appendChild(card);
  });
}

function openTopic(idx) {
  currentTopic = TOPICS[idx];
  currentMode = null;
  currentQ = 0;
  answers = [];
  scores = [];
  tableData = {};

  document.getElementById('topicTitle').textContent = currentTopic.title;
  document.getElementById('topicSection').textContent = currentTopic.section;
  document.getElementById('briefingBox').innerHTML = currentTopic.briefing;
  
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  
  const tableBtn = document.getElementById('modetable');
  if (!currentTopic.table) {
    tableBtn.style.opacity = '0.35';
    tableBtn.style.pointerEvents = 'none';
  } else {
    tableBtn.style.opacity = '1';
    tableBtn.style.pointerEvents = 'auto';
  }

  document.getElementById('questionArea').innerHTML = '';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('topicScreen').classList.add('active');
}

function selectMode(mode) {
  currentMode = mode;
  currentQ = 0;
  answers = [];
  scores = [];
  tableData = {};
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('mode'+mode).classList.add('selected');
  renderQuestion();
}

function renderQuestion() {
  const area = document.getElementById('questionArea');
  if (currentMode === 'mc') renderMC(area);
  else if (currentMode === 'eq') renderEQ(area);
  else if (currentMode === 'table') renderTable(area);
}

function renderMC(area) {
  const qs = currentTopic.mc;
  const q = qs[currentQ];
  const total = qs.length;
  const pct = Math.round((currentQ / total) * 100);

  area.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-area">
      <div class="q-label">Question ${currentQ + 1} of ${total}</div>
      <div class="q-text">${q.q}</div>
      <div class="mc-options" id="mcOpts">
        ${q.opts.map((o, i) => `<div class="mc-opt" id="opt${i}" onclick="selectMC(${i})"><span class="opt-letter">${'ABCD'[i]}.</span>${o}</div>`).join('')}
      </div>
    </div>
    <div id="mcFeedback"></div>
    <div class="btn-row">
      <button class="btn primary" id="submitMC" onclick="submitMC()" disabled>Submit answer</button>
    </div>
  `;
}

let selectedOpt = null;
function selectMC(i) {
  if (document.getElementById('submitMC').disabled === false && document.getElementById('opt0').classList.contains('correct')) return;
  selectedOpt = i;
  document.querySelectorAll('.mc-opt').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
  document.getElementById('submitMC').disabled = false;
}

function submitMC() {
  const q = currentTopic.mc[currentQ];
  const correct = selectedOpt === q.ans;
  scores.push(correct ? 1 : 0);
  answers.push(selectedOpt);

  document.querySelectorAll('.mc-opt').forEach((el, idx) => {
    el.classList.remove('selected');
    if (idx === q.ans) el.classList.add('correct');
    else if (idx === selectedOpt && !correct) el.classList.add('wrong');
  });

  const fb = document.getElementById('mcFeedback');
  fb.innerHTML = correct
    ? `<div class="feedback-box success"><div class="feedback-label"><i class="ti ti-circle-check"></i> Correct!</div>Well done. <strong>${q.opts[q.ans]}</strong> is right.</div>`
    : `<div class="feedback-box error"><div class="feedback-label"><i class="ti ti-circle-x"></i> Not quite</div>The correct answer is <strong>${q.opts[q.ans]}</strong>.</div>`;

  const submitBtn = document.getElementById('submitMC');
  submitBtn.textContent = currentQ < currentTopic.mc.length - 1 ? 'Next question →' : 'See results';
  submitBtn.onclick = () => {
    if (currentQ < currentTopic.mc.length - 1) { currentQ++; selectedOpt = null; renderMC(document.getElementById('questionArea')); }
    else showMCScore();
  };
  submitBtn.disabled = false;
}

function showMCScore() {
  const total = scores.length;
  const correct = scores.reduce((a,b) => a+b, 0);
  const pct = Math.round((correct/total)*100);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scoreScreen').classList.add('active');
  document.getElementById('scoreBig').textContent = `${correct}/${total}`;
  document.getElementById('scoreSub').textContent = `${pct}% correct · ${currentTopic.title}`;
  const detail = document.getElementById('scoreDetail');
  detail.innerHTML = `<div style="font-size:13px;font-weight:500;margin-bottom:10px;">Question breakdown</div>` +
    currentTopic.mc.map((q, i) => `
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:13px;">
        <i class="ti ${scores[i] ? 'ti-circle-check' : 'ti-circle-x'}" style="color:${scores[i] ? '#0F6E56' : '#993C1D'};margin-top:1px;flex-shrink:0;" aria-hidden="true"></i>
        <span style="color:var(--color-text-secondary)">${q.q}</span>
      </div>`).join('');
}

function renderEQ(area) {
  area.innerHTML = `
    <div class="question-area">
      <div class="q-label">Essay / Short answer</div>
      <div class="q-text">${currentTopic.eq}</div>
      <textarea class="eq-input" id="eqInput" placeholder="Type your answer here..."></textarea>
    </div>
    <div id="eqFeedback"></div>
    <div class="btn-row">
      <button class="btn ai-btn" id="gradeBtn" onclick="gradeEQ()"><i class="ti ti-sparkles" aria-hidden="true"></i> Grade with AI ↗</button>
    </div>
  `;
}

async function gradeEQ() {
  const answer = document.getElementById('eqInput').value.trim();
  if (!answer || answer.length < 20) {
    document.getElementById('eqFeedback').innerHTML = `<div class="feedback-box error">Please write a more complete answer before grading.</div>`;
    return;
  }

  const btn = document.getElementById('gradeBtn');
  btn.disabled = true;
  const fb = document.getElementById('eqFeedback');
  fb.innerHTML = `<div class="feedback-box loading"><div class="feedback-label">AI is reviewing your answer <div class="typing"><span></span><span></span><span></span></div></div></div>`;

  const prompt = `You are a US History teacher grading a student's essay response. 

Question: "${currentTopic.eq}"

Student's answer: "${answer}"

Please provide:
1. A score out of 10 (be fair but rigorous)
2. What the student did well (2-3 specific points)
3. What's missing or could be improved (2-3 specific points)
4. One key fact or concept they should make sure to include

Keep your response concise and encouraging. Format clearly with labels for each section.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.map(i => i.text || '').join('\n');
    const scoreMatch = text.match(/(\d+)\s*\/\s*10/);
    const score = scoreMatch ? parseInt(scoreMatch[1]) : null;
    const level = score >= 8 ? 'success' : score >= 5 ? 'partial' : 'error';
    fb.innerHTML = `<div class="feedback-box ${level}"><div class="feedback-label"><i class="ti ti-robot"></i> AI Feedback${score !== null ? ` · ${score}/10` : ''}</div><div style="white-space:pre-wrap;font-size:13px;">${text.replace(/</g,'&lt;')}</div></div>`;
  } catch(e) {
    fb.innerHTML = `<div class="feedback-box error">Couldn't connect to AI grader. Check your connection and try again.</div>`;
  }
  btn.disabled = false;
}

function renderTable(area) {
  const t = currentTopic.table;
  if (!t) return;
  
  const rows = t.rows.map((row, ri) =>
    `<tr>${row.map((cell, ci) => ci === 0
      ? `<td style="font-size:13px;color:var(--color-text-secondary);padding:8px 10px;border:0.5px solid var(--color-border-tertiary);min-width:120px;">${cell}</td>`
      : `<td style="border:0.5px solid var(--color-border-tertiary);padding:4px;"><textarea data-r="${ri}" data-c="${ci}" style="width:100%;min-height:55px;border:none;background:transparent;font-size:12px;font-family:var(--font-sans);color:var(--color-text-primary);resize:vertical;outline:none;padding:4px;" placeholder="Type here..."></textarea></td>`
    ).join('')}</tr>`
  ).join('');

  area.innerHTML = `
    <div class="question-area" style="padding:1rem;">
      <div class="q-label">Table work — fill in each cell</div>
    </div>
    <div class="table-area">
      <table class="study-table">
        <thead><tr>${t.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div id="tableFeedback"></div>
    <div class="btn-row">
      <button class="btn ai-btn" onclick="gradeTable()"><i class="ti ti-sparkles" aria-hidden="true"></i> Grade table with AI ↗</button>
    </div>
  `;
}

async function gradeTable() {
  const cells = document.querySelectorAll('.study-table textarea');
  let tableText = `Table: ${currentTopic.table.headers.join(' | ')}\n`;
  currentTopic.table.rows.forEach((row, ri) => {
    const vals = [row[0]];
    cells.forEach(c => { if (parseInt(c.dataset.r) === ri) vals.push(c.value || '(blank)'); });
    tableText += vals.join(' | ') + '\n';
  });

  const fb = document.getElementById('tableFeedback');
  fb.innerHTML = `<div class="feedback-box loading"><div class="feedback-label">AI is reviewing your table <div class="typing"><span></span><span></span><span></span></div></div></div>`;

  const prompt = `You are a US History teacher reviewing a student's completed table.

Topic: ${currentTopic.title}

${tableText}

Please:
1. Highlight 2-3 cells the student filled in well
2. Identify 2-3 cells that need correction or more detail, and explain what should be there
3. Give an overall completeness rating (e.g. "Well done", "Good start", "Needs more work")

Be specific and helpful. Keep it concise.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.map(i => i.text || '').join('\n');
    fb.innerHTML = `<div class="feedback-box partial"><div class="feedback-label"><i class="ti ti-robot"></i> AI Table Feedback</div><div style="white-space:pre-wrap;font-size:13px;">${text.replace(/</g,'&lt;')}</div></div>`;
  } catch(e) {
    fb.innerHTML = `<div class="feedback-box error">Couldn't connect to AI grader. Try again.</div>`;
  }
}

buildTopicGrid();
</script>
